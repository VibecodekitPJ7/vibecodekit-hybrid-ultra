name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + audit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # eval_select needs the merge-base — fetch full history.
          fetch-depth: 0

      - name: Assert canonical org (drift guard, hard fail)
        # Hard fail.  KHÔNG có cơ chế bypass — fork CI phải tự sync ALLOWED_ORGS
        # hoặc fork với canonical org khớp.  Xem
        # ``tests/test_repo_urls_canonical.py``: canonical org PERMANENT là
        # VibecodekitPJ6 (cycle 6, sau 8 lần rebrand).  Anti-pattern
        # env-gated bypass (cycle 5) đã được loại bỏ ở PR1 cycle 6 —
        # quy tắc tự tắt được không phải quy tắc.
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          owner="${{ github.repository_owner }}"
          echo "owner=$owner"
          if [ "$owner" != "VibecodekitPJ6" ]; then
            echo "::error::Canonical org là VibecodekitPJ6, nhưng đang chạy dưới '$owner'.  Fork CI: sync ALLOWED_ORGS trong tests/test_repo_urls_canonical.py hoặc dùng pytest -k 'not test_repo_urls_canonical' cho fork suite."
            exit 1
          fi
          # Cross-check git remote (chống case repo settings drift).
          remote="$(git config --get remote.origin.url || true)"
          echo "remote=$remote"
          if ! echo "$remote" | grep -qE "VibecodekitPJ6/"; then
            echo "::error::remote.origin.url không match VibecodekitPJ6/ — drift."
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest + ruff + mypy + coverage (core stays stdlib-only)
        run: |
          python -m pip install --upgrade pip
          pip install pytest ruff mypy coverage

      - name: Lint (ruff F401/F841/F811)
        # PR2: zero-tolerance cho unused imports / unused locals / shadowed
        # imports.  Style rules KHÔNG bật ở stage này.
        env:
          PYTHONPATH: ./scripts
        run: |
          python -m ruff check scripts/vibecodekit --select F401,F841,F811

      - name: mypy strict (5 core modules)
        # Cycle 6 PR2: strict gate cho permission_engine, scaffold_engine,
        # verb_router, denial_store, _audit_log.  Các module khác (tool_executor,
        # team_mode, task_runtime, subagent_runtime) relax trong mypy.ini —
        # cycle sau sẽ siết.
        env:
          PYTHONPATH: ./scripts
        run: |
          python -m mypy --strict \
            scripts/vibecodekit/permission_engine.py \
            scripts/vibecodekit/scaffold_engine.py \
            scripts/vibecodekit/verb_router.py \
            scripts/vibecodekit/denial_store.py \
            scripts/vibecodekit/_audit_log.py

      - name: eval_select preview (diff-based test selection)
        # Visibility-only on every event: prints the selection so reviewers
        # can see which tests would have been chosen.  We always run the
        # FULL suite below for safety, but expose the diff-based preview
        # so the eval_select pipeline is exercised and any breakage is
        # caught immediately on CI rather than at /vck-ship time.
        # ``continue-on-error`` so an eval_select bug never blocks the
        # mandatory quality gates (pytest / audit / release-matrix).
        continue-on-error: true
        env:
          PYTHONPATH: ./scripts
          BASE: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'origin/main^' }}
        run: |
          git fetch origin --no-tags --depth=200 "${BASE#origin/}" || true
          python -m vibecodekit.eval_select \
            --base "$BASE" \
            --map tests/touchfiles.json \
            --json | tee eval_select.preview.json
          # Emit a one-line summary for the workflow log.
          python -c "import json; d=json.load(open('eval_select.preview.json')); print(f\"selected={len(d.get('selected') or [])} unmapped={len(d.get('unmapped_changes') or [])}\")"

      - name: pytest (full suite)
        env:
          VIBECODE_UPDATE_PACKAGE: ${{ github.workspace }}/update-package
          PYTHONPATH: ./scripts
        run: |
          python -m pytest tests -q

      - name: conformance_audit (internal self-test)
        env:
          VIBECODE_UPDATE_PACKAGE: ${{ github.workspace }}/update-package
          PYTHONPATH: ./scripts
        run: |
          python -m vibecodekit.conformance_audit --threshold 1.0

      - name: pytest with coverage (tool_executor focus, Phase 1)
        # Cycle 6 PR3: per-module gate cho tool_executor.py >=80%
        # (hot-path subprocess module nguy hiểm nhất, đáng có coverage
        # cao nhất).  Global TOTAL gate fail_under=60 ở Phase 1; sẽ
        # raise lên 80 ở Phase 2 (sau khi vn_*, team_mode đạt 80%).
        env:
          VIBECODE_UPDATE_PACKAGE: ${{ github.workspace }}/update-package
          PYTHONPATH: ./scripts
        run: |
          python -m coverage run --source=scripts/vibecodekit -m pytest tests -q
          python -m coverage report
          python -m coverage report --include='scripts/vibecodekit/tool_executor.py' --fail-under=80
          python -m coverage xml -o coverage.xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

      - name: validate release matrix (L1 + L2 + L3)
        env:
          PYTHONPATH: ./scripts
        run: |
          python tools/validate_release_matrix.py \
            --skill . \
            --update ./update-package
