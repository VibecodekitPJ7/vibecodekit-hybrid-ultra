name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + audit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest (core stays stdlib-only)
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: pytest (full suite)
        env:
          VIBECODE_UPDATE_PACKAGE: ${{ github.workspace }}/update-package
          PYTHONPATH: ./scripts
        run: |
          python -m pytest tests -q

      - name: conformance_audit (77 / 77 @ 100 %)
        env:
          VIBECODE_UPDATE_PACKAGE: ${{ github.workspace }}/update-package
          PYTHONPATH: ./scripts
        run: |
          python -m vibecodekit.conformance_audit --threshold 1.0

      - name: validate release matrix (L1 + L2 + L3)
        env:
          PYTHONPATH: ./scripts
        run: |
          python tools/validate_release_matrix.py \
            --skill . \
            --update ./update-package
