[mypy]
python_version = 3.9
strict = True
warn_unused_ignores = True
warn_unreachable = True
show_error_codes = True
pretty = True

# Stdlib platform-specific (no stubs ổn định trên mọi nền tảng).
[mypy-fcntl]
ignore_missing_imports = True

[mypy-msvcrt]
ignore_missing_imports = True

# Modules tightening cycle sau (không trong scope PR2 — relax strict
# tạm thời để PR2 không gồng chuyển toàn bộ surface).  Cycle tới sẽ
# bật strict cho các module này.
[mypy-vibecodekit.tool_executor]
strict = False

[mypy-vibecodekit.team_mode]
strict = False

[mypy-vibecodekit.task_runtime]
strict = False

[mypy-vibecodekit.subagent_runtime]
strict = False
