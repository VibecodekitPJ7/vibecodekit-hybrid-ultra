[mypy]
python_version = 3.9
strict = True
warn_unused_ignores = True
warn_unreachable = True
show_error_codes = True
pretty = True

# Stdlib platform-specific (no stubs ổn định trên mọi nền tảng).
[mypy-fcntl]
ignore_missing_imports = True

[mypy-msvcrt]
ignore_missing_imports = True

# Cycle 7 PR3: 4 module trước đây ``strict = False`` đã được đưa lên
# strict (tool_executor / team_mode / task_runtime / subagent_runtime).
# Nếu cần re-relax cho cycle sau, thêm block ``[mypy-vibecodekit.<name>]``
# tương tự như fcntl/msvcrt — nhưng KHÔNG khuyến nghị (sẽ regress type
# safety).
